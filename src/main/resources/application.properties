# =======================
# APPLICATION NAME
# =======================
spring.application.name=quantity-measurement-app

# =======================
# DATABASE (Railway)
# =======================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =======================
# SWAGGER
# =======================
springdoc.swagger-ui.path=/quantity-measurement-app

# =======================
# ACTUATOR
# =======================
management.endpoints.web.exposure.include=health,metrics

# =======================
# JWT CONFIG
# =======================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===============================
# GOOGLE OAUTH2
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# ? IMPORTANT: use deployed backend URL later
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}

# ===============================
# FRONTEND URL
# ===============================
app.oauth2.frontend-redirect=${FRONTEND_REDIRECT}
app.oauth2.frontend-login-url=${FRONTEND_LOGIN}