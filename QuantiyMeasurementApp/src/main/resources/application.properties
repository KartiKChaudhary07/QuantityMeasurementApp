# =======================
# APPLICATION NAME
# =======================
spring.application.name=quantity-measurement-app

# =======================
# MYSQL (RAILWAY) DATABASE CONFIGURATION
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =======================
# SWAGGER
# =======================
springdoc.swagger-ui.path=/quantity-measurement-app

# =======================
# ACTUATOR
# =======================
management.endpoints.web.exposure.include=health,metrics

# =======================
# JWT CONFIG
# =======================
jwt.secret=mysecretkeymysecretkeymysecretkeymysecretkay12345
jwt.expiration=86400000

# ===============================
# GOOGLE OAUTH2
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# ? IMPORTANT: use deployed backend URL later
spring.security.oauth2.client.registration.google.redirect-uri=https://quantitymeasurementapp-production-0a69.up.railway.app/login/oauth2/code/google

# ===============================
# FRONTEND URL
# ===============================
app.oauth2.frontend-redirect=http://localhost:5173/auth/callback
app.oauth2.frontend-login-url=http://localhost:5173/login